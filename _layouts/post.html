---
layout: default
---
<article class="essay">
  <a class="back-link" href="{{ '/#notes' | relative_url }}">← All notes</a>
  <header class="essay-header">
    <p class="eyebrow">{{ page.category | default: "Field note" }} · {{ page.date | date: "%d %B %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.excerpt %}<p class="lede">{{ page.excerpt | strip_html | strip_newlines }}</p>{% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
